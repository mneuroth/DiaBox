name: Qt WASM Build (jurplel)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_wasm:
    name: Build Qt WebAssembly (wasm_singlethread)
    runs-on: ubuntu-24.04
    env:
      QT_VERSION: 6.10.3
      QT_INSTALL_DIR: ./Qt

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install basic tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build wget

      - name: Install Qt host (gcc_64)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.3'
          target: 'desktop'
          arch: 'linux_gcc_64'
          dir: ${{ runner.temp }}/Qt
          install-deps: true

      - name: Install Qt WASM (wasm_singlethread)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.3'
          target: 'all_os'
          arch: 'wasm_singlethread'
          dir: ${{ runner.temp }}/QtWASM
          install-deps: false

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: '3.1.57'

      - name: Activate Emscripten and verify
        run: |
          source $EMSDK/emsdk_env.sh
          emcc --version
          em++ --version
          ninja --version || true

      - name: Configure CMake for WASM
        run: |
          source $EMSDK/emsdk_env.sh
          export QT_PATH=${{ runner.temp }}/QtWASM/$QT_VERSION/wasm_singlethread
          export QT_HOST_PATH=${{ runner.temp }}/Qt/$QT_VERSION/gcc_64
          export EMSDK_PATH=$(dirname $(which emcc))/..

          echo "QT_PATH=$QT_PATH"
          echo "QT_HOST_PATH=$QT_HOST_PATH"

          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$EMSDK_PATH/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake \
            -DCMAKE_PREFIX_PATH=$QT_PATH/lib/cmake \
            -DQt6_DIR=$QT_PATH/lib/cmake/Qt6 \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build WASM binary
        run: cmake --build build --parallel

      - name: Collect WASM artifacts
        run: |
          mkdir -p release_files
          find build -maxdepth 1 -type f \( -name '*.wasm' -o -name '*.js' -o -name '*.html' -o -name '*.data' -o -name '*.wasm.map' \) -exec cp {} release_files/ \;
          ls -la release_files

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-release
          path: release_files

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
