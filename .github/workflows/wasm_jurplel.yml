name: Qt WASM Build (jurplel)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_wasm:
    name: Build Qt WebAssembly (wasm_singlethread)
    runs-on: ubuntu-24.04
    env:
      QT_VERSION: 6.9.3
      EMSCRIPTEN_VERSION: 3.1.70

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install basic tools
        run: |
          echo "Updating package lists and installing cmake, ninja-build, and wget..."
          sudo apt-get update
          echo "Installing cmake, ninja-build, and wget..."
          sudo apt-get install -y cmake ninja-build wget
          echo "Verifying installations..."
          cmake --version
          ninja --version
          echo "Basic tools installed and verified successfully."

      - name: Install Qt host (gcc_64)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: 'desktop'
          arch: 'linux_gcc_64'
          dir: ${{ runner.temp }}/Qt
          install-deps: true

      - name: Configure CMake for Host
        run: |
          cmake -S . -B build_host -G Ninja \
            -DCMAKE_PREFIX_PATH=${{ runner.temp }}/Qt/$QT_VERSION/gcc_64/lib/cmake \
            -DQt6_DIR=${{ runner.temp }}/Qt/$QT_VERSION/gcc_64/lib/cmake/Qt6 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build for Host
        run: |
          cmake --build build_host --parallel
          ls -lrt build_host

      - name: Install Qt WASM (wasm_singlethread)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: 'all_os'
          target: 'wasm'
          arch: 'wasm_singlethread'
          modules: 'qtimageformats qtshadertools qtquicktimeline'
          archives: 'qtbase qtdeclarative qtquick qtquickcontrols2 qtsvg qttranslations qttools'
          dir: ${{ runner.temp }}/QtWASM
          install-deps: false

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: ${{ env.EMSCRIPTEN_VERSION }}

      - name: Activate Emscripten and verify
        run: |
          source $EMSDK/emsdk_env.sh
          emcc --version
          em++ --version
          ninja --version || true

      - name: Configure CMake for WASM
        run: |
          source $EMSDK/emsdk_env.sh
          export QT_WASM_PATH=${{ runner.temp }}/QtWASM/Qt/$QT_VERSION/wasm_singlethread
          export QT_HOST_PATH=${{ runner.temp }}/Qt/Qt/$QT_VERSION/gcc_64

          echo "QT_WASM_PATH=$QT_WASM_PATH"
          echo "QT_HOST_PATH=$QT_HOST_PATH"

          #for debugging: aqt list-qt all_os wasm --modules $QT_VERSION wasm_singlethread

          #for debugging:   -DCMAKE_VERBOSE_MAKEFILE=ON
          #for debugging:   -DQT_DEBUG_FIND_PACKAGE=ON
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$QT_WASM_PATH/lib/cmake/Qt6/qt.toolchain.cmake \
            -DCMAKE_PREFIX_PATH=$QT_WASM_PATH/lib/cmake \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build WASM binary
        run: |
          cmake --build build --parallel
          pwd
          ls -lrt build

      - name: Collect WASM artifacts
        run: |
          mkdir -p release_files
          find build -maxdepth 1 -type f \( -name '*.wasm' -o -name '*.js' -o -name '*.html' -o -name '*.data' -o -name '*.wasm.map' \) -exec cp {} release_files/ \;
          ls -la release_files

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-release
          path: release_files

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# run WASM build in output direcotry: python -m http.server 8080

# Qt‑Version	Passende Emscripten‑Version	Quelle
# Qt 6.2	2.0.14
# Qt 6.3	3.0.0
# Qt 6.4	3.1.14
# Qt 6.5	3.1.25
# Qt 6.6	3.1.37
# Qt 6.7	3.1.50
# Qt 6.8	3.1.56
# Qt 6.9	3.1.70
