name: Qt WASM Build (jurplel)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_wasm:
    name: Build Qt WebAssembly (wasm_singlethread)
    runs-on: ubuntu-24.04
    env:
      QT_VERSION: 6.8.3
      QT_INSTALL_DIR: ./Qt

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install basic tools
        run: |
          echo "Updating package lists and installing cmake, ninja-build, and wget..."
          sudo apt-get update
          echo "Installing cmake, ninja-build, and wget..."
          sudo apt-get install -y cmake ninja-build wget
          echo "Verifying installations..."
          cmake --version
          ninja --version
          echo "Basic tools installed and verified successfully."

      - name: Install Qt host (gcc_64)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtimageformats qtshadertools qtquicktimeline'
          archives: 'qtbase qtdeclarative qtquick qtquickcontrols2'
          dir: ${{ runner.temp }}/Qt
          install-deps: true

      - name: Install Qt WASM (wasm_singlethread)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'all_os'
          target: 'wasm'
          arch: 'wasm_singlethread'
          modules: 'qtimageformats qtshadertools qtquicktimeline'
          archives: 'qtbase qtdeclarative qtquick qtquickcontrols2'
          dir: ${{ runner.temp }}/QtWASM
          install-deps: false

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: '3.1.57'

      - name: Activate Emscripten and verify
        run: |
          source $EMSDK/emsdk_env.sh
          emcc --version
          em++ --version
          ninja --version || true

      - name: Configure CMake for WASM
        run: |
          export QT_INSTALL_DIR=${{ runner.temp }}/QtWASM
          source $EMSDK/emsdk_env.sh
          export QT_PATH=${{ runner.temp }}/QtWASM/Qt/$QT_VERSION/wasm_singlethread
          export QT_HOST_PATH=${{ runner.temp }}/Qt/Qt/$QT_VERSION/gcc_64
          #export EMSDK_PATH=$(dirname $(which emcc))/..

          echo "QT_INSTALL_DIR=$QT_INSTALL_DIR"
          echo "QT_PATH=$QT_PATH"
          echo "QT_HOST_PATH=$QT_HOST_PATH"

          echo "============="
          ls -lrt
          echo "-------------"
          ls -lrt $QT_INSTALL_DIR
          echo "-------------"
          ls -lrt $QT_INSTALL_DIR/Qt
          echo "-------------"
          ls -lrt $QT_HOST_PATH
          echo "-------------"
          ls -lrt $QT_PATH
          echo "-------------"
          ls -lrt $QT_PATH/lib/cmake
          echo "-------------"
          ls -lrt $QT_PATH/lib/cmake/Qt6
          echo "-------------"

          aqt list-qt all_os wasm --modules 6.8.3 wasm_singlethread

          #python3 -m aqt install-qt linux wasm 6.8.3 wasm_singlethread \
          #  --modules qtdeclarative qtshadertools qtquickcontrols2 qtquicktimeline

          echo "============="
          ls -lrt "$QT_PATH/lib/cmake" || true
          echo "============="
          ls -lrt "$QT_HOST_PATH/lib/cmake" || true
          echo "============="
          ls -lrt "$QT_PATH/lib/cmake/Qt6Quick" || true
          echo "============="

          # --trace-expand
          # --log-level=VERBOSE
          #qt-cmake -S . -B build \
          #  -G Ninja \
          #  -DCMAKE_TOOLCHAIN_FILE=$EMSDK/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake \
          #  -DCMAKE_PREFIX_PATH=$QT_PATH/lib/cmake:$QT_HOST_PATH/lib/cmake:$QT_PATH/lib/cmake/Qt6 \
          #  -DCMAKE_VERBOSE_MAKEFILE=ON \
          #  -DQT_DEBUG_FIND_PACKAGE=ON \
          #  -DCMAKE_BUILD_TYPE=Release

          #$QT_PATH/lib/cmake/Qt6/qt.toolchain.cmake
          #-DCMAKE_TOOLCHAIN_FILE=$EMSDK/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake \
          #-DCMAKE_TOOLCHAIN_FILE=$QT_PATH/lib/cmake/Qt6/qt.toolchain.cmake \
          cmake -S . -B build \
            -G Ninja \
            -DBUILD_WASM=ON \
            -DCMAKE_TOOLCHAIN_FILE=$QT_PATH/lib/cmake/Qt6/qt.toolchain.cmake \
            -DCMAKE_PREFIX_PATH=$QT_PATH/lib/cmake:$QT_HOST_PATH/lib/cmake \
            -DQt6_DIR=$QT_PATH/lib/cmake/Qt6 \
            -DQt6Core_DIR=$QT_PATH/lib/cmake/Qt6Core \
            -DQt6Quick_DIR=$QT_PATH/lib/cmake/Qt6Quick \
            -DQt6BundledZLIB_DIR=$QT_PATH/lib/cmake/Qt6BundledZLIB \
            -DQt6BundledPcre2_DIR=$QT_PATH/lib/cmake/Qt6BundledPcre2 \
            -DQt6ZlibPrivate_DIR=$QT_PATH/lib/cmake/Qt6ZlibPrivate \
            -DQt6Gui_DIR=$QT_PATH/lib/cmake/Qt6Gui \
            -DQt6BundledLibpng_DIR=$QT_PATH/lib/cmake/Qt6BundledLibpng \
            -DQt6BundledHarfbuzz_DIR=$QT_PATH/lib/cmake/Qt6BundledHarfbuzz \
            -DQt6BundledFreetype_DIR=$QT_PATH/lib/cmake/Qt6BundledFreetype \
            -DQt6BundledLibjpeg_DIR=$QT_PATH/lib/cmake/Qt6BundledLibjpeg \
            -DQt6Qml_DIR=$QT_PATH/lib/cmake/Qt6Qml \
            -DQt6QuickVectorImage_DIR=$QT_PATH/lib/cmake/Qt6QuickVectorImage \
            -DQt6QmlMacros_DIR=$QT_PATH/lib/cmake/Qt6QmlMacros \
            -DQt6QuickVectorImageGeneratorPrivate_DIR=$QT_PATH/lib/cmake/Qt6QuickVectorImageGeneratorPrivate \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DCMAKE_VERBOSE_MAKEFILE=ON \
            -DQT_DEBUG_FIND_PACKAGE=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build WASM binary
        run: cmake --build build --parallel

      - name: Collect WASM artifacts
        run: |
          mkdir -p release_files
          find build -maxdepth 1 -type f \( -name '*.wasm' -o -name '*.js' -o -name '*.html' -o -name '*.data' -o -name '*.wasm.map' \) -exec cp {} release_files/ \;
          ls -la release_files

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-release
          path: release_files

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
