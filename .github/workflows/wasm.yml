name: Qt WASM Build and Release

on:
  push:
    tags:
      - 'v*.*.*' # Löst den Release-Workflow bei Version-Tags aus

jobs:
  build_wasm:
    name: Build Qt WebAssembly
    runs-on: ubuntu-22.04

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: aqtinstall installieren
        run: pip install aqtinstall==3.3.0

      - name: Qt 6.6.3 WASM installieren
        env:
          QT_MIRROR: https://download.qt.io/online/qtsdkrepository/
        run: |
          aqt install-qt linux desktop 6.6.3 gcc_64 \
            --outputdir ${{ runner.temp }}/Qt/Qt
          aqt list-qt linux desktop --modules 6.6.3 wasm_singlethread
          aqt install-qt linux desktop 6.6.3 wasm_singlethread \
            --outputdir ${{ runner.temp }}/Qt
          #  --modules qtquick qtdeclarative qtshadertools qtquickcontrols2
          #  -m qtbase qtdeclarative qttranslations qttools \
          # see: https://download.qt.io/online/qtsdkrepository/windows_x86/wasm/qt6_7_3/qt6_673_wasm_singlethread/
          # see: https://download.qt.io/online/qtsdkrepository/linux_x64/desktop/qt6_663_wasm_singlethread/
          # see: https://download.qt.io/online/qtsdkrepository/linux_x64/wasm/qt6_7_3/qt6_673_wasm_singlethread/
          echo "abc"
          ls -lrt ${{ runner.temp }}/Qt/Qt
          ls -lrt ${{ runner.temp }}/Qt/Qt/6.6.3
          echo "xyz"
          ls -lrt ${{ runner.temp }}/Qt
          ls -lrt ${{ runner.temp }}/Qt/6.6.3
          echo "done."

      - name: Emscripten Toolchain einrichten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: '3.1.37'
          actions-on-failure: 'warn'

      - name: Emscripten aktivieren
        run: |
          source $EMSDK/emsdk_env.sh
          emcc --version
          em++ --version

      - name: Build-Verzeichnis erstellen
        run: mkdir -p build

      - name: Ninja installieren
        run: |
          sudo apt-get update && sudo apt-get install -y ninja-build
          ninja --version

      - name: CMake Konfiguration (WASM)
        run: |
          export QT_PATH=${{ runner.temp }}/Qt/6.6.3/wasm_singlethread
          export QT_PATH_WASM=${{ runner.temp }}/Qt/6.6.3/wasm_singlethread
          export QT_PATH_HOST=${{ runner.temp }}/Qt/Qt/6.6.3/gcc_64
          export EMSDK_PATH=$(dirname $(which emcc))/..
          
          echo "QT_PATH: $QT_PATH"
          echo "QT_PATH_HOST: $QT_PATH_HOST"
          echo "QT_PATH_WASM: $QT_PATH_WASM"
          ls -lrt $QT_PATH_HOST
          ls -lrt $QT_PATH_WASM
          ls -lrt $QT_PATH/lib/cmake
          echo "done."

          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=${EMSDK}/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake \
            -DCMAKE_PREFIX_PATH=$QT_PATH/lib/cmake \
            -DQt6_DIR=$QT_PATH/lib/cmake/Qt6 \
            -DQt6Quick_DIR=$QT_PATH/lib/cmake/Qt6Quick \
            -DQt6Core_DIR=$QT_PATH/lib/cmake/Qt6Core \
            -DQt6BundledZLIB_DIR=$QT_PATH/lib/cmake/Qt6BundledZLIB \
            -DQt6BundledPcre2_DIR=$QT_PATH/lib/cmake/Qt6BundledPcre2 \
            -DQt6ZlibPrivate_DIR=$QT_PATH/lib/cmake/Qt6ZlibPrivate \
            -DCMAKE_BUILD_TYPE=Release \
            -DQT_HOST_PATH=$QT_PATH_HOST \
            -G Ninja

      - name: Anwendung kompilieren
        run: cmake --build build --parallel

      - name: Artefakte für Release vorbereiten
        run: |
          mkdir -p release_files
          
          # Findet alle WASM-Ausgabedateien (z.B. .wasm, .js, .html, .css)
          find build -type f \( -name "*.wasm" -o -name "*.js" -o -name "*.html" -o -name "*.css" \) -exec cp {} release_files/ \;
          
          # Falls Sie noch zusätzliche Dateien benötigen (z.B. Ressourcen):
          if [ -d "build/DiaBox" ]; then
            cp -r build/DiaBox/* release_files/ 2>/dev/null || true
          fi
          
          ls -la release_files/
          
      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
